<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>StayMatch | Hostel & Roommate Finder</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background -->
  <div class="background"></div>

  <!-- Login Card -->
  <div class="login-card">
    <h1>StayMatch</h1>
    <p class="tagline">Find a place. Find your people.</p>

    <!-- Feature indicators -->
    <div class="features">
      <div class="feature">🏠 <span>Hostels & PGs</span></div>
      <div class="feature">🧑‍🤝‍🧑 <span>Roommate Matching</span></div>
    </div>

    <input type="email" placeholder="Email address">
    <input type="password" placeholder="Password">

    <button>Login</button>

    <span class="divider">or</span>

    <button class="guest-btn">Explore as Guest</button>

    <div class="bottom-text">
      New here? <a href="#">Create an account</a>
    </div>
  </div>

</body>
</html>
