<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StayMatch | Neural Roommate Integration</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <div class="video-container">
        <div class="image-overlay"></div>
        <img src="https://www.rent.com/blog/wp-content/uploads/2021/03/roommatesunsplash.png" class="bg-img" alt="Roommates">
    </div>

    <div class="main-layout">
        
        <div class="content-left">
            <div class="brand-header">
                <div class="logo">Stay<span>Match</span></div>
                <p class="brand-quote">A home is more than an address. It’s where your story syncs. Find your human.</p>
            </div>

            <div class="tag-row">
                <span class="tag">🏠 Near Downtown</span>
                <span class="tag">🐱 Pet Friendly</span>
                <span class="tag">☕ Early Bird</span>
            </div>

            <div class="login-glass-card">
                <div class="tab-group">
                    <button id="login-tab" class="tab-btn active">Login</button>
                    <button id="signup-tab" class="tab-btn">Sign Up</button>
                </div>

                <form id="loginForm" class="auth-form active">
                    <div class="input-group">
                        <label>Neural Identity</label>
                        <input type="email" id="login-email" placeholder="name@domain.com" required>
                    </div>
                    <div class="input-group">
                        <label>Security Key</label>
                        <input type="password" id="login-pass" placeholder="••••••••" required>
                    </div>
                    <button type="button" class="btn-primary" onclick="loginUser()">Initialize Session ⚡</button>
                </form>

                <form id="signupForm" class="auth-form" style="display:none">
                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" placeholder="Anshu Gupta">
                    </div>
                    </form>
            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
